<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Task 4 - Form Validation & DOM</title>

  <!-- Bootstrap (optional but useful) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="p-3 border-bottom">
    <div class="container d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center gap-2">
        <!-- LOGO -->
        <img src="assets/images/logo.png" alt="Logo" width="48" height="48" style="object-fit:contain">
        <h4 class="m-0 brand">Kiruthika - Task 4</h4>
      </div>

      <nav>
        <button id="nav-login" class="btn btn-link">Login</button>
        <button id="nav-register" class="btn btn-link">Register</button>
        <button id="nav-users" class="btn btn-link">Users</button>
      </nav>
    </div>
  </header>

  <main class="container my-5">
    <!-- TOAST (in-page message) -->
    <div id="toast" class="toast-box" role="status" aria-live="polite" aria-atomic="true" hidden>
      <div id="toast-msg"></div>
    </div>

    <!-- LOGIN VIEW -->
    <section id="view-login" class="view">
      <div class="row align-items-center">
        <div class="col-md-6">
          <h2>Login</h2>
          <form id="login-form" novalidate>
            <div class="mb-3">
              <label for="login-email" class="form-label">Email</label>
              <input id="login-email" class="form-control" type="email" required />
              <div class="invalid-feedback" data-for="login-email"></div>
            </div>

            <div class="mb-3">
              <label for="login-password" class="form-label">Password</label>
              <input id="login-password" class="form-control" type="password" required />
              <div class="invalid-feedback" data-for="login-password"></div>
            </div>

            <button class="btn btn-primary" type="submit">Sign In</button>
          </form>
          <p class="mt-3 text-muted">Don't have an account? <button id="goto-register" class="btn btn-link p-0">Register here</button></p>
        </div>

        <div class="col-md-6 text-center d-none d-md-block">
          <!-- optional illustration on right -->
          <img src="assets/images/register.png" alt="Login Illustration" class="img-fluid" style="max-width:320px;">
        </div>
      </div>
    </section>

    <!-- REGISTER VIEW -->
    <section id="view-register" class="view" hidden>
      <div class="row align-items-center">
        <div class="col-md-6">
          <h2>Register</h2>
          <form id="register-form" novalidate>
            <div class="mb-3">
              <label for="reg-username" class="form-label">Username</label>
              <input id="reg-username" class="form-control" type="text" required />
              <div class="invalid-feedback" data-for="reg-username"></div>
            </div>

            <div class="mb-3">
              <label for="reg-email" class="form-label">Email</label>
              <input id="reg-email" class="form-control" type="email" required />
              <div class="invalid-feedback" data-for="reg-email"></div>
            </div>

            <!-- Phone (optional) -->
            <div class="mb-3">
              <label for="reg-phone" class="form-label">Phone Number</label>
              <input id="reg-phone" class="form-control" type="tel" placeholder="+91XXXXXXXXXX" />
              <div class="invalid-feedback" data-for="reg-phone"></div>
              <div class="form-text">Optional. Accepts local or international formats.</div>
            </div>

            <div class="mb-3">
              <label for="reg-password" class="form-label">Password</label>
              <input id="reg-password" class="form-control" type="password" required />
              <div class="form-text">Use at least 8 chars, letter + number, and one special char.</div>
              <div class="invalid-feedback" data-for="reg-password"></div>
            </div>

            <div class="mb-3">
              <label for="reg-password2" class="form-label">Confirm Password</label>
              <input id="reg-password2" class="form-control" type="password" required />
              <div class="invalid-feedback" data-for="reg-password2"></div>
            </div>

            <!-- Password strength bar -->
            <div class="mb-3">
              <label class="form-label">Password strength</label>
              <div class="pw-meter">
                <div id="pw-bar" class="pw-bar"></div>
              </div>
              <small id="pw-text" class="form-text text-muted">Type a password to see strength</small>
            </div>

            <button class="btn btn-success" type="submit">Register</button>
          </form>
        </div>

        <div class="col-md-6 text-center d-none d-md-block">
          <img src="assets/images/register.png" alt="Register Illustration" class="img-fluid" style="max-width:340px;">
        </div>
      </div>
    </section>

    <!-- USERS VIEW -->
    <section id="view-users" class="view" hidden>
      <h2>Registered Users</h2>
      <div id="users-list" class="row gy-3 mt-3"></div>
    </section>
  </main>

  <footer class="p-4 text-center text-muted border-top">
    <small>Task 4 — Complex Form Validation & Dynamic DOM — Kiruthika</small>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
